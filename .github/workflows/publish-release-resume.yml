name: Resume Publish Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to resume publishing (for example 2.1.0-rc.2)
        required: true
        type: string
      release_channel:
        description: Dist-tag mode for npm publishing
        required: true
        default: auto
        type: choice
        options:
          - auto
          - rc
          - latest
      publish_typescript:
        description: Resume npm packages publish
        required: true
        default: false
        type: boolean
      publish_android:
        description: Resume Android Maven Central publish
        required: true
        default: false
        type: boolean
      publish_ios:
        description: Run full iOS publish (build all pods + upload to GitHub Release + push to CocoaPods trunk)
        required: true
        default: false
        type: boolean
      publish_template:
        description: Resume sparkling-app-template publish
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write
  id-token: write

env:
  NODE_VERSION: '22.21.1'
  PNPM_VERSION: '10.26.0'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.inputs.version }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare Resume Publish
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.prepare.outputs.version }}
      is_rc: ${{ steps.prepare.outputs.is_rc }}
      npm_tag: ${{ steps.prepare.outputs.npm_tag }}
    steps:
      - name: Resolve version and channel
        id: prepare
        run: |
          VERSION="${{ github.event.inputs.version }}"
          CHANNEL="${{ github.event.inputs.release_channel }}"

          if [ -z "$VERSION" ]; then
            echo "::error::version is required"
            exit 1
          fi

          if [[ "$CHANNEL" == "rc" ]]; then
            IS_RC=true
          elif [[ "$CHANNEL" == "latest" ]]; then
            IS_RC=false
          elif [[ "$VERSION" =~ -rc\.[0-9]+$ ]]; then
            IS_RC=true
          else
            IS_RC=false
          fi

          if [ "$IS_RC" = "true" ]; then
            NPM_TAG=rc
          else
            NPM_TAG=latest
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "is_rc=$IS_RC" >> "$GITHUB_OUTPUT"
          echo "npm_tag=$NPM_TAG" >> "$GITHUB_OUTPUT"

          echo "Resume publish plan"
          echo "  version: $VERSION"
          echo "  is_rc:   $IS_RC"
          echo "  npm_tag: $NPM_TAG"

  preflight-linux-auth:
    name: Preflight npm + Maven auth
    runs-on: ubuntu-latest
    needs: prepare
    if: ${{ github.event.inputs.publish_typescript == 'true' || github.event.inputs.publish_android == 'true' || github.event.inputs.publish_template == 'true' }}
    environment:
      name: package releasement
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify npm + Maven auth
        uses: ./.github/actions/preflight-registry-auth
        with:
          publish_android: ${{ github.event.inputs.publish_android }}
          maven_central_username: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          maven_central_password: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          signing_key_id: ${{ secrets.SIGNING_KEY_ID }}
          signing_password: ${{ secrets.SIGNING_PASSWORD }}
          signing_key: ${{ secrets.SIGNING_KEY }}

  preflight-darwin-auth:
    name: Preflight CocoaPods auth
    runs-on: macos-latest
    needs: prepare
    if: ${{ github.event.inputs.publish_ios == 'true' || github.event.inputs.publish_template == 'true' }}
    environment:
      name: package releasement
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify CocoaPods auth
        uses: ./.github/actions/preflight-registry-auth
        with:
          publish_ios: ${{ github.event.inputs.publish_ios }}
          cocoapods_trunk_token: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}

  publish-typescript:
    name: Resume NPM Packages
    runs-on: ubuntu-latest
    needs: [prepare, preflight-linux-auth]
    if: ${{ github.event.inputs.publish_typescript == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'

      - name: Ensure latest npm
        run: |
          npm install -g npm@latest

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm --filter '!sparkling-website' -r build

      - name: Update versions
        run: |
          chmod +x scripts/update-all-version.sh
          ./scripts/update-all-version.sh ${{ needs.prepare.outputs.version }}

      - name: Publish to npm (skip existing versions)
        env:
          NPM_CONFIG_PROVENANCE: 'true'
          SPARKLING_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          if [ "${{ needs.prepare.outputs.is_rc }}" == "true" ]; then
            node scripts/release-unify-and-publish.mjs publish --version ${{ needs.prepare.outputs.version }} --tag rc --trusted-publishing
          else
            node scripts/release-unify-and-publish.mjs publish --version ${{ needs.prepare.outputs.version }} --release --trusted-publishing
          fi

  publish-android:
    name: Resume Android Maven Publish
    runs-on: ubuntu-latest
    needs: [prepare, preflight-linux-auth]
    if: ${{ github.event.inputs.publish_android == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish Android
        uses: ./.github/actions/publish-android
        with:
          version: ${{ needs.prepare.outputs.version }}
          maven_central_username: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          maven_central_password: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          signing_key_id: ${{ secrets.SIGNING_KEY_ID }}
          signing_password: ${{ secrets.SIGNING_PASSWORD }}
          signing_key: ${{ secrets.SIGNING_KEY }}

  publish-ios:
    name: Publish iOS Pods
    runs-on: macos-latest
    needs: [prepare, preflight-darwin-auth]
    if: ${{ github.event.inputs.publish_ios == 'true' }}
    permissions:
      contents: write
    environment:
      name: package releasement
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Publish iOS pods
        uses: ./.github/actions/publish-ios
        with:
          version: ${{ needs.prepare.outputs.version }}
          is_rc: ${{ needs.prepare.outputs.is_rc }}
          cocoapods_trunk_token: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

  publish-template:
    name: Resume App Template Publish
    runs-on: macos-latest
    needs: [prepare, preflight-linux-auth, preflight-darwin-auth]
    if: ${{ github.event.inputs.publish_template == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'

      - name: Ensure latest npm
        run: npm install -g npm@latest

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Update all versions
        run: |
          chmod +x scripts/update-all-version.sh
          ./scripts/update-all-version.sh ${{ needs.prepare.outputs.version }}

      - name: Check template package status
        id: template_check
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          if npm view "sparkling-app-template@$VERSION" version --registry https://registry.npmjs.org 2>/dev/null | grep -q "$VERSION"; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish template to npm
        if: steps.template_check.outputs.already_published != 'true'
        working-directory: template/sparkling-app-template
        env:
          NPM_CONFIG_PROVENANCE: 'true'
        run: |
          if [ "${{ needs.prepare.outputs.npm_tag }}" == "rc" ]; then
            pnpm publish --registry https://registry.npmjs.org --access public --tag rc --no-git-checks
          else
            pnpm publish --registry https://registry.npmjs.org --access public --tag latest --no-git-checks
          fi
