name: Publish Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ──────────────────────────────────────────────────────────────
  # Step 0: Extract version from tag
  # ──────────────────────────────────────────────────────────────
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      is_rc: ${{ steps.get_version.outputs.is_rc }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: get_version
        run: |
          echo "========================================="
          echo "  Step 0: Extracting version from tag"
          echo "========================================="
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "✅ Extracted version: $VERSION"
          echo "   Git ref: $GITHUB_REF"
          echo "   SHA: $GITHUB_SHA"

          if [[ "$VERSION" =~ -rc\.[0-9]+$ ]]; then
            echo "is_rc=true" >> $GITHUB_OUTPUT
            echo "✅ Detected RC (release candidate) version"
          else
            echo "is_rc=false" >> $GITHUB_OUTPUT
            echo "✅ Detected stable release version"
          fi
          echo "========================================="

  # ──────────────────────────────────────────────────────────────
  # Step 1: Update all versions (Android/iOS/JS)
  # This is done inside each publish job since they run on
  # different runners. The prepare job provides the version.
  # ──────────────────────────────────────────────────────────────

  preflight-registry-auth:
    name: Preflight npm + Maven auth
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Ensure latest npm
        run: |
          npm install -g npm@latest
          npm --version

      - name: Verify npm registry connectivity
        run: |
          echo "🔍 Verifying npm registry connectivity..."
          npm ping --registry https://registry.npmjs.org
          echo "✅ npm registry is reachable"

      - name: Verify Maven Central credentials and API reachability
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          SIGNING_KEY_ID: ${{ secrets.SIGNING_KEY_ID }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
        run: |
          echo "🔍 Verifying Maven Central release secrets..."
          MISSING=""
          [ -z "$MAVEN_CENTRAL_USERNAME" ] && MISSING="$MISSING MAVEN_CENTRAL_USERNAME"
          [ -z "$MAVEN_CENTRAL_PASSWORD" ] && MISSING="$MISSING MAVEN_CENTRAL_PASSWORD"
          [ -z "$SIGNING_KEY_ID" ] && MISSING="$MISSING SIGNING_KEY_ID"
          [ -z "$SIGNING_PASSWORD" ] && MISSING="$MISSING SIGNING_PASSWORD"
          [ -z "$SIGNING_KEY" ] && MISSING="$MISSING SIGNING_KEY"
          if [ -n "$MISSING" ]; then
            echo "::error::Missing Maven Central secrets:$MISSING"
            exit 1
          fi

          BEARER_TOKEN=$(printf '%s:%s' "$MAVEN_CENTRAL_USERNAME" "$MAVEN_CENTRAL_PASSWORD" | base64)
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${BEARER_TOKEN}" \
            "https://ossrh-staging-api.central.sonatype.com/manual/search/repositories?ip=any&profile_id=com.tiktok.sparkling")
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::Maven Central API auth check failed (HTTP $HTTP_CODE)."
            exit 1
          fi
          echo "✅ Maven Central auth looks valid"

  preflight-cocoapods-auth:
    name: Preflight CocoaPods auth
    runs-on: macos-latest
    needs: prepare
    steps:
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install CocoaPods
        run: |
          gem install cocoapods
          pod setup

      - name: Verify CocoaPods trunk token
        env:
          COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
        run: |
          if [ -z "$COCOAPODS_TRUNK_TOKEN" ]; then
            echo "::error::COCOAPODS_TRUNK_TOKEN secret is missing or empty."
            exit 1
          fi
          COCOAPODS_TRUNK_TOKEN=$COCOAPODS_TRUNK_TOKEN pod trunk me >/tmp/pod_trunk_me.txt 2>&1 || {
            cat /tmp/pod_trunk_me.txt
            echo "::error::pod trunk me failed. Check COCOAPODS_TRUNK_TOKEN validity."
            exit 1
          }
          echo "✅ CocoaPods trunk token is valid"

  # ──────────────────────────────────────────────────────────────
  # Step 2: Publish Android, iOS, and npm packages in parallel
  #         (playground, sparkling-sdk, sparkling-app-template
  #          are NOT published here)
  # ──────────────────────────────────────────────────────────────

  # 2a. Publish TypeScript packages to npm
  publish-typescript:
    name: Publish NPM Packages
    runs-on: ubuntu-latest
    needs: [prepare, preflight-registry-auth]
    environment:
      name: package releasement
      url: https://www.npmjs.com/package/sparkling-sdk
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log job start
        run: |
          echo "========================================="
          echo "  Step 2a: Publish NPM Packages"
          echo "========================================="
          echo "  Version: ${{ needs.prepare.outputs.version }}"
          echo "  Is RC:   ${{ needs.prepare.outputs.is_rc }}"
          echo "  Runner:  ${{ runner.os }} (${{ runner.arch }})"
          echo "========================================="

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Ensure latest npm (>= 11.5.1 required for Trusted Publishing)
        run: |
          echo "📦 Upgrading npm for Trusted Publishing support..."
          npm install -g npm@latest
          echo "✅ npm version: $(npm --version)"

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.26.0

      - name: Install dependencies
        run: |
          echo "📦 Installing dependencies with frozen lockfile..."
          pnpm install --frozen-lockfile
          echo "✅ Dependencies installed successfully"

      - name: Build packages
        run: |
          echo "🔨 Building all packages (skipping website)..."
          pnpm --filter '!sparkling-website' -r build
          echo "✅ All packages built successfully"

      - name: Update versions
        run: |
          echo "📝 Updating all versions to ${{ needs.prepare.outputs.version }}..."
          chmod +x scripts/update-all-version.sh
          ./scripts/update-all-version.sh ${{ needs.prepare.outputs.version }}
          echo "✅ Versions updated successfully"

      - name: Check if npm packages already published
        id: npm_check
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          echo "🔍 Checking if all npm packages are already published at version $VERSION..."
          mapfile -t PKGS < <(node - <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');

          const repoRoot = process.cwd();
          const excluded = new Set(["sparkling-playground", "sparkling-sdk", "sparkling-app-template"]);
          const roots = [path.join(repoRoot, "packages"), path.join(repoRoot, "template")];

          function readPackageJson(dir) {
            const pj = path.join(dir, 'package.json');
            if (!fs.existsSync(pj)) return null;
            try {
              return JSON.parse(fs.readFileSync(pj, 'utf8'));
            } catch {
              return null;
            }
          }

          const out = [];
          for (const root of roots) {
            if (!fs.existsSync(root)) continue;
            for (const name of fs.readdirSync(root)) {
              const dir = path.join(root, name);
              if (!fs.statSync(dir).isDirectory()) continue;
              if (name === 'website') continue;
              if (dir.includes(`${path.sep}test${path.sep}`)) continue;
              const pkg = readPackageJson(dir);
              if (!pkg || !pkg.name) continue;
              if (pkg.private) continue;
              if (excluded.has(pkg.name)) continue;
              out.push(pkg.name);

              if (root.endsWith(`${path.sep}packages`) && name === 'methods') {
                for (const m of fs.readdirSync(dir)) {
                  const sub = path.join(dir, m);
                  if (!fs.statSync(sub).isDirectory()) continue;
                  const subPkg = readPackageJson(sub);
                  if (!subPkg || !subPkg.name || subPkg.private || excluded.has(subPkg.name)) continue;
                  out.push(subPkg.name);
                }
              }
            }
          }

          [...new Set(out)].sort().forEach((name) => console.log(name));
          NODE
          )

          ALL_PUBLISHED=true
          for pkg in "${PKGS[@]}"; do
            if npm view "${pkg}@${VERSION}" version --registry https://registry.npmjs.org 2>/dev/null | grep -q "$VERSION"; then
              echo "   ✅ ${pkg}@${VERSION} already exists"
            else
              echo "   ⏳ ${pkg}@${VERSION} not found yet"
              ALL_PUBLISHED=false
            fi
          done

          if [ "$ALL_PUBLISHED" = "true" ]; then
            echo "⚠️ All npm packages at version $VERSION already exist — skipping publish"
            echo "already_published=true" >> $GITHUB_OUTPUT
          else
            echo "✅ Some npm packages are missing at version $VERSION — publish will continue"
            echo "already_published=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish to npm
        if: steps.npm_check.outputs.already_published != 'true'
        env:
          NPM_CONFIG_PROVENANCE: 'true'
          SPARKLING_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          echo "🚀 Publishing TypeScript packages to npm..."
          echo "   Version: ${{ needs.prepare.outputs.version }}"
          echo "   Is RC: ${{ needs.prepare.outputs.is_rc }}"
          echo "   Auth: Trusted Publishing (OIDC)"
          echo "   Provenance: enabled"
          if [ "${{ needs.prepare.outputs.is_rc }}" == "true" ]; then
            echo "   Tag: rc"
            node scripts/release-unify-and-publish.mjs publish --version ${{ needs.prepare.outputs.version }} --tag rc --trusted-publishing
          else
            echo "   Tag: latest"
            node scripts/release-unify-and-publish.mjs publish --version ${{ needs.prepare.outputs.version }} --release --trusted-publishing
          fi
          echo "✅ TypeScript packages published successfully"

  # 2b. Publish Android to Maven Central
  publish-android:
    name: Publish Android to Maven Central
    runs-on: ubuntu-latest
    needs: [prepare, preflight-registry-auth]
    environment:
      name: package releasement
      url: https://central.sonatype.com/artifact/com.tiktok.sparkling/sparkling
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log job start
        run: |
          echo "========================================="
          echo "  Step 2b: Publish Android to Maven Central"
          echo "========================================="
          echo "  Version: ${{ needs.prepare.outputs.version }}"
          echo "  Runner:  ${{ runner.os }} (${{ runner.arch }})"
          echo "========================================="

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Log JDK info
        run: |
          echo "☕ JDK version:"
          java -version 2>&1
          echo "✅ JDK setup complete"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Update versions
        run: |
          echo "📝 Updating all versions to ${{ needs.prepare.outputs.version }}..."
          chmod +x scripts/update-all-version.sh
          ./scripts/update-all-version.sh ${{ needs.prepare.outputs.version }}
          echo "✅ Versions updated successfully"

      - name: Verify Maven Central credentials
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          SIGNING_KEY_ID: ${{ secrets.SIGNING_KEY_ID }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
        run: |
          echo "🔑 Verifying Maven Central credentials..."
          MISSING=""
          [ -z "$MAVEN_CENTRAL_USERNAME" ] && MISSING="$MISSING MAVEN_CENTRAL_USERNAME"
          [ -z "$MAVEN_CENTRAL_PASSWORD" ] && MISSING="$MISSING MAVEN_CENTRAL_PASSWORD"
          [ -z "$SIGNING_KEY_ID" ] && MISSING="$MISSING SIGNING_KEY_ID"
          [ -z "$SIGNING_PASSWORD" ] && MISSING="$MISSING SIGNING_PASSWORD"
          [ -z "$SIGNING_KEY" ] && MISSING="$MISSING SIGNING_KEY"
          if [ -n "$MISSING" ]; then
            echo "❌ Missing secrets:$MISSING"
            echo "::error::Missing Maven Central secrets:$MISSING"
            exit 1
          fi
          echo "✅ All Maven Central credentials are present"
          echo "   Username length: ${#MAVEN_CENTRAL_USERNAME} chars"
          echo "   Signing Key ID: ${SIGNING_KEY_ID}"

      - name: Check if Android SDK already published
        id: maven_check
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          echo "🔍 Checking if Android artifacts are already published at version $VERSION..."

          SDK_URL="https://repo1.maven.org/maven2/com/tiktok/sparkling/sparkling/$VERSION/sparkling-$VERSION.pom"
          DEBUG_TOOL_URL="https://repo1.maven.org/maven2/com/tiktok/sparkling/sparkling-debug-tool/$VERSION/sparkling-debug-tool-$VERSION.pom"

          SDK_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$SDK_URL" 2>/dev/null || echo "000")
          DEBUG_TOOL_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$DEBUG_TOOL_URL" 2>/dev/null || echo "000")

          if [ "$SDK_STATUS" == "200" ] && [ "$DEBUG_TOOL_STATUS" == "200" ]; then
            echo "⚠️ Android artifacts already exist on Maven Central — skipping publish"
            echo "::warning::Android artifacts at version $VERSION already published on Maven Central. Skipping."
            echo "already_published=true" >> $GITHUB_OUTPUT
          else
            echo "✅ Missing Android artifact(s) detected (sparkling=$SDK_STATUS, sparkling-debug-tool=$DEBUG_TOOL_STATUS) — proceeding with publish"
            echo "already_published=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish to Maven Central
        if: steps.maven_check.outputs.already_published != 'true'
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          SIGNING_KEY_ID: ${{ secrets.SIGNING_KEY_ID }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
        run: |
          echo "🚀 Publishing Android SDK to Maven Central..."
          echo "   Version: ${{ needs.prepare.outputs.version }}"
          chmod +x scripts/publish-android-maven.sh
          ./scripts/publish-android-maven.sh ${{ needs.prepare.outputs.version }} --skip-tests
          echo "✅ Android SDK published to Maven Central successfully"

  # 2c. Publish iOS SparklingMethod to CocoaPods
  publish-ios-method:
    name: Publish iOS SparklingMethod
    runs-on: macos-latest
    needs: [prepare, preflight-cocoapods-auth]
    environment:
      name: package releasement
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log job start
        run: |
          echo "========================================="
          echo "  Step 2c: Publish iOS SparklingMethod"
          echo "========================================="
          echo "  Version: ${{ needs.prepare.outputs.version }}"
          echo "  Runner:  ${{ runner.os }} (${{ runner.arch }})"
          echo "========================================="

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install CocoaPods
        run: |
          echo "📦 Installing CocoaPods..."
          gem install cocoapods
          pod setup
          echo "✅ CocoaPods version: $(pod --version)"

      - name: Update versions
        run: |
          echo "📝 Updating all versions to ${{ needs.prepare.outputs.version }}..."
          chmod +x scripts/update-all-version.sh
          ./scripts/update-all-version.sh ${{ needs.prepare.outputs.version }}
          echo "✅ Versions updated successfully"

      - name: Verify CocoaPods credentials
        env:
          COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
        run: |
          echo "🔑 Verifying CocoaPods trunk token..."
          if [ -z "$COCOAPODS_TRUNK_TOKEN" ]; then
            echo "❌ COCOAPODS_TRUNK_TOKEN is empty!"
            echo "::error::COCOAPODS_TRUNK_TOKEN secret is missing or empty."
            exit 1
          fi
          TRUNK_INFO=$(COCOAPODS_TRUNK_TOKEN=$COCOAPODS_TRUNK_TOKEN pod trunk me 2>&1) || {
            echo "❌ CocoaPods trunk authentication failed!"
            echo "::error::pod trunk me failed. Check that COCOAPODS_TRUNK_TOKEN is valid."
            echo "   Output: $TRUNK_INFO"
            exit 1
          }
          echo "✅ CocoaPods trunk authentication successful:"
          echo "$TRUNK_INFO"

      - name: Check if SparklingMethod already published
        id: pod_method_check
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          echo "🔍 Checking if SparklingMethod is already published at version $VERSION..."
          if pod trunk info SparklingMethod 2>/dev/null | grep -q "$VERSION"; then
            echo "⚠️ SparklingMethod $VERSION already exists on CocoaPods — skipping publish"
            echo "::warning::SparklingMethod at version $VERSION already published. Skipping."
            echo "already_published=true" >> $GITHUB_OUTPUT
          else
            echo "✅ SparklingMethod $VERSION not found on CocoaPods — proceeding with publish"
            echo "already_published=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish SparklingMethod to CocoaPods
        if: steps.pod_method_check.outputs.already_published != 'true'
        env:
          COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
        run: |
          echo "🚀 Publishing SparklingMethod to CocoaPods..."
          echo "   Version: ${{ needs.prepare.outputs.version }}"
          chmod +x scripts/publish-ios-sparkling-method.sh
          ./scripts/publish-ios-sparkling-method.sh ${{ needs.prepare.outputs.version }} --skip-git
          echo "✅ SparklingMethod published to CocoaPods successfully"

  # 2d. Publish iOS Sparkling SDK to CocoaPods (depends on SparklingMethod)
  publish-ios-sdk:
    name: Publish iOS Sparkling SDK
    runs-on: macos-latest
    needs: [prepare, preflight-cocoapods-auth, publish-ios-method]
    environment:
      name: package releasement
      url: https://cocoapods.org/pods/Sparkling
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log job start
        run: |
          echo "========================================="
          echo "  Step 2d: Publish iOS Sparkling SDK"
          echo "========================================="
          echo "  Version: ${{ needs.prepare.outputs.version }}"
          echo "  Runner:  ${{ runner.os }} (${{ runner.arch }})"
          echo "  Depends: publish-ios-method (SparklingMethod)"
          echo "========================================="

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install CocoaPods
        run: |
          echo "📦 Installing CocoaPods..."
          gem install cocoapods
          pod setup
          echo "✅ CocoaPods version: $(pod --version)"

      - name: Update versions
        run: |
          echo "📝 Updating all versions to ${{ needs.prepare.outputs.version }}..."
          chmod +x scripts/update-all-version.sh
          ./scripts/update-all-version.sh ${{ needs.prepare.outputs.version }}
          echo "✅ Versions updated successfully"

      - name: Wait for SparklingMethod CDN sync
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          echo "⏳ Waiting for SparklingMethod $VERSION to be available on CDN..."
          FOUND=false
          for i in {1..30}; do
            if pod trunk info SparklingMethod 2>/dev/null | grep -q "$VERSION"; then
              echo "✅ SparklingMethod $VERSION is available on CDN (after $i checks)"
              FOUND=true
              break
            fi
            echo "   Waiting... ($i/30, next check in 10s)"
            sleep 10
          done
          if [ "$FOUND" != "true" ]; then
            echo "❌ SparklingMethod $VERSION was NOT found on CDN after 30 attempts (5 minutes)"
            echo "::error::SparklingMethod $VERSION not available on CocoaPods CDN after 5 minutes"
            exit 1
          fi

      - name: Check if Sparkling SDK already published
        id: pod_sdk_check
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          echo "🔍 Checking if Sparkling SDK is already published at version $VERSION..."
          if pod trunk info Sparkling 2>/dev/null | grep -q "$VERSION"; then
            echo "⚠️ Sparkling $VERSION already exists on CocoaPods — skipping publish"
            echo "::warning::Sparkling SDK at version $VERSION already published. Skipping."
            echo "already_published=true" >> $GITHUB_OUTPUT
          else
            echo "✅ Sparkling $VERSION not found on CocoaPods — proceeding with publish"
            echo "already_published=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish Sparkling to CocoaPods
        if: steps.pod_sdk_check.outputs.already_published != 'true'
        env:
          COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
        run: |
          echo "🚀 Publishing Sparkling SDK to CocoaPods..."
          echo "   Version: ${{ needs.prepare.outputs.version }}"
          chmod +x scripts/publish-ios-sparkling.sh
          ./scripts/publish-ios-sparkling.sh ${{ needs.prepare.outputs.version }} --skip-wait --skip-git
          echo "✅ Sparkling SDK published to CocoaPods successfully"

  # 2e. Publish iOS Sparkling-DebugTool to CocoaPods (depends on SparklingMethod git tag)
  publish-ios-debug-tool:
    name: Publish iOS Sparkling-DebugTool
    runs-on: macos-latest
    needs: [prepare, preflight-cocoapods-auth, publish-ios-method]
    environment:
      name: package releasement
      url: https://cocoapods.org/pods/Sparkling-DebugTool
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log job start
        run: |
          echo "========================================="
          echo "  Step 2e: Publish iOS Sparkling-DebugTool"
          echo "========================================="
          echo "  Version: ${{ needs.prepare.outputs.version }}"
          echo "  Runner:  ${{ runner.os }} (${{ runner.arch }})"
          echo "  Depends: publish-ios-method (SparklingMethod)"
          echo "========================================="

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install CocoaPods
        run: |
          echo "Installing CocoaPods..."
          gem install cocoapods
          pod setup
          echo "✅ CocoaPods version: $(pod --version)"

      - name: Update versions
        run: |
          echo "📝 Updating all versions to ${{ needs.prepare.outputs.version }}..."
          chmod +x scripts/update-all-version.sh
          ./scripts/update-all-version.sh ${{ needs.prepare.outputs.version }}
          echo "✅ Versions updated successfully"

      - name: Check if Sparkling-DebugTool already published
        id: pod_debug_tool_check
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          echo "🔍 Checking if Sparkling-DebugTool is already published at version $VERSION..."
          if pod trunk info Sparkling-DebugTool 2>/dev/null | grep -q "$VERSION"; then
            echo "⚠️ Sparkling-DebugTool $VERSION already exists on CocoaPods — skipping publish"
            echo "::warning::Sparkling-DebugTool at version $VERSION already published. Skipping."
            echo "already_published=true" >> $GITHUB_OUTPUT
          else
            echo "✅ Sparkling-DebugTool $VERSION not found on CocoaPods — proceeding with publish"
            echo "already_published=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish Sparkling-DebugTool to CocoaPods
        if: steps.pod_debug_tool_check.outputs.already_published != 'true'
        env:
          COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
        run: |
          echo "🚀 Publishing Sparkling-DebugTool to CocoaPods..."
          echo "   Version: ${{ needs.prepare.outputs.version }}"
          chmod +x scripts/publish-ios-sparkling-debug-tool.sh
          ./scripts/publish-ios-sparkling-debug-tool.sh ${{ needs.prepare.outputs.version }}
          echo "✅ Sparkling-DebugTool published to CocoaPods successfully"

  # ──────────────────────────────────────────────────────────────
  # Step 3: Update sparkling-app-template dependencies and
  #         verify build succeeds
  # Step 4: Publish sparkling-app-template to npm
  # ──────────────────────────────────────────────────────────────
  publish-template:
    name: Update & Publish App Template
    runs-on: macos-latest
    needs: [prepare, publish-typescript, publish-android, publish-ios-sdk, publish-ios-debug-tool]
    environment:
      name: package releasement
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log job start
        run: |
          echo "========================================="
          echo "  Step 3+4: Update & Publish App Template"
          echo "========================================="
          echo "  Version: ${{ needs.prepare.outputs.version }}"
          echo "  Is RC:   ${{ needs.prepare.outputs.is_rc }}"
          echo "  Runner:  ${{ runner.os }} (${{ runner.arch }})"
          echo "  Depends: publish-typescript, publish-android, publish-ios-sdk, publish-ios-debug-tool"
          echo "========================================="

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Ensure latest npm (>= 11.5.1 required for Trusted Publishing)
        run: |
          echo "📦 Upgrading npm for Trusted Publishing support..."
          npm install -g npm@latest
          echo "✅ npm version: $(npm --version)"

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.26.0

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install CocoaPods
        run: |
          echo "📦 Installing CocoaPods..."
          gem install cocoapods
          pod setup
          echo "✅ CocoaPods version: $(pod --version)"

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: |
          echo "📦 Installing workspace dependencies..."
          pnpm install --frozen-lockfile
          echo "✅ Dependencies installed successfully"

      - name: Build packages
        run: |
          echo "🔨 Building all packages (skipping website)..."
          pnpm --filter '!sparkling-website' -r build
          echo "✅ All packages built successfully"

      # Step 3a: Update template version
      - name: Update all versions
        run: |
          echo "📝 [Step 3a] Updating all versions to ${{ needs.prepare.outputs.version }}..."
          chmod +x scripts/update-all-version.sh
          ./scripts/update-all-version.sh ${{ needs.prepare.outputs.version }}
          echo "✅ Versions updated successfully"

      # Step 3b: Update npm dependencies in template package.json
      - name: Update template npm dependencies
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          TEMPLATE_PKG="template/sparkling-app-template/package.json"

          echo "📝 [Step 3b] Updating template npm dependencies..."
          echo "   File: $TEMPLATE_PKG"

          echo "   Updating sparkling-navigation -> ^${VERSION}"
          sed -i '' "s|\"sparkling-navigation\": *\"[^\"]*\"|\"sparkling-navigation\": \"^${VERSION}\"|" "$TEMPLATE_PKG"

          echo "   Updating sparkling-debug-tool -> ~${VERSION}"
          sed -i '' "s|\"sparkling-debug-tool\": *\"[^\"]*\"|\"sparkling-debug-tool\": \"~${VERSION}\"|" "$TEMPLATE_PKG"

          echo "   Updating sparkling-app-cli -> ~${VERSION}"
          sed -i '' "s|\"sparkling-app-cli\": *\"[^\"]*\"|\"sparkling-app-cli\": \"~${VERSION}\"|" "$TEMPLATE_PKG"

          echo ""
          echo "✅ Updated template package.json:"
          cat "$TEMPLATE_PKG"

      # Step 3c: Update Android dependencies in build.gradle.kts
      - name: Update template Android dependencies
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          GRADLE_FILE="template/sparkling-app-template/android/app/build.gradle.kts"

          echo "📝 [Step 3c] Updating template Android dependencies..."
          echo "   File: $GRADLE_FILE"

          echo "   Updating com.tiktok.sparkling:sparkling -> ${VERSION}"
          sed -i '' "s|com.tiktok.sparkling:sparkling:[^\"]*|com.tiktok.sparkling:sparkling:${VERSION}|" "$GRADLE_FILE"

          echo "   Updating com.tiktok.sparkling:sparkling-method -> ${VERSION}"
          sed -i '' "s|com.tiktok.sparkling:sparkling-method:[^\"]*|com.tiktok.sparkling:sparkling-method:${VERSION}|" "$GRADLE_FILE"

          echo ""
          echo "✅ Updated build.gradle.kts:"
          cat "$GRADLE_FILE"

      # Step 3d: Update iOS dependencies in Podfile
      - name: Update template iOS dependencies
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          PODFILE="template/sparkling-app-template/ios/Podfile"

          echo "📝 [Step 3d] Updating template iOS dependencies..."
          echo "   File: $PODFILE"

          echo "   Updating SPARKLING_VERSION -> '${VERSION}'"
          sed -i '' "s|SPARKLING_VERSION = '[^']*'|SPARKLING_VERSION = '${VERSION}'|" "$PODFILE"

          echo ""
          echo "✅ Updated Podfile:"
          cat "$PODFILE"

      # Step 3e: Wait for npm packages to be available
      - name: Wait for npm packages availability
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          echo "⏳ [Step 3e] Waiting for npm packages to be available..."
          ALL_FOUND=true
          for pkg in sparkling-navigation sparkling-debug-tool sparkling-app-cli; do
            echo ""
            echo "   Checking $pkg@$VERSION..."
            FOUND=false
            for i in {1..30}; do
              if npm view "$pkg@$VERSION" version 2>/dev/null | grep -q "$VERSION"; then
                echo "   ✅ $pkg@$VERSION is available on npm (after $i checks)"
                FOUND=true
                break
              fi
              echo "   Waiting for $pkg... ($i/30, next check in 10s)"
              sleep 10
            done
            if [ "$FOUND" != "true" ]; then
              echo "   ❌ $pkg@$VERSION was NOT found on npm after 30 attempts (5 minutes)"
              echo "::error::$pkg@$VERSION not available on npm after 5 minutes"
              ALL_FOUND=false
            fi
          done
          if [ "$ALL_FOUND" != "true" ]; then
            echo ""
            echo "❌ Some npm packages are not available. Aborting."
            exit 1
          fi
          echo ""
          echo "✅ All npm packages are available"

      # Step 3f: Verify JS build
      - name: Verify template JS build
        working-directory: template/sparkling-app-template
        run: |
          echo "🔨 [Step 3f] Verifying template JS build..."
          echo "   Working directory: $(pwd)"
          echo ""
          echo "   Installing template dependencies..."
          pnpm install --no-frozen-lockfile
          echo ""
          echo "   Running build..."
          pnpm build
          echo ""
          echo "✅ Template JS build succeeded!"

      # Step 3g: Verify Android build
      - name: Verify template Android build
        working-directory: template/sparkling-app-template/android
        run: |
          echo "🔨 [Step 3g] Verifying template Android build..."
          echo "   Working directory: $(pwd)"
          echo ""
          chmod +x ./gradlew 2>/dev/null || true
          if ./gradlew assembleDebug --no-daemon; then
            echo ""
            echo "✅ Template Android build succeeded!"
          else
            echo ""
            echo "⚠️ Template Android build failed!"
            echo "::warning::Android build verification failed - this may indicate dependency issues"
          fi

      # Step 3h: Verify iOS pod install
      - name: Wait for CocoaPods CDN sync
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          echo "⏳ [Step 3h] Waiting for Sparkling pods to be available on CDN..."
          ALL_FOUND=true
          for pod_name in SparklingMethod Sparkling Sparkling-DebugTool; do
            echo ""
            echo "   Checking $pod_name@$VERSION..."
            FOUND=false
            for i in {1..30}; do
              if pod trunk info "$pod_name" 2>/dev/null | grep -q "$VERSION"; then
                echo "   ✅ $pod_name $VERSION is available on CDN (after $i checks)"
                FOUND=true
                break
              fi
              echo "   Waiting for $pod_name... ($i/30, next check in 10s)"
              sleep 10
            done
            if [ "$FOUND" != "true" ]; then
              echo "   ❌ $pod_name $VERSION was NOT found on CDN after 30 attempts (5 minutes)"
              echo "::warning::$pod_name $VERSION not available on CocoaPods CDN after 5 minutes"
              ALL_FOUND=false
            fi
          done
          if [ "$ALL_FOUND" == "true" ]; then
            echo ""
            echo "✅ All CocoaPods are available on CDN"
          else
            echo ""
            echo "⚠️ Some pods are not yet available on CDN, proceeding anyway..."
          fi

      - name: Verify template iOS pod install
        working-directory: template/sparkling-app-template/ios
        run: |
          echo "🔨 [Step 3h] Verifying template iOS pod install..."
          echo "   Working directory: $(pwd)"
          echo ""
          if pod install; then
            echo ""
            echo "✅ Template iOS pod install succeeded!"
          else
            echo ""
            echo "⚠️ Template iOS pod install failed!"
            echo "::warning::iOS pod install verification failed - this may indicate dependency issues"
          fi

      # Step 4: Publish sparkling-app-template to npm
      - name: Check if template already published
        id: template_check
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          echo "🔍 Checking if sparkling-app-template is already published at version $VERSION..."
          if npm view "sparkling-app-template@$VERSION" version 2>/dev/null | grep -q "$VERSION"; then
            echo "⚠️ sparkling-app-template@$VERSION already exists on npm — skipping publish"
            echo "::warning::sparkling-app-template at version $VERSION already published. Skipping."
            echo "already_published=true" >> $GITHUB_OUTPUT
          else
            echo "✅ sparkling-app-template@$VERSION not found on npm — proceeding with publish"
            echo "already_published=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish template to npm
        if: steps.template_check.outputs.already_published != 'true'
        working-directory: template/sparkling-app-template
        env:
          NPM_CONFIG_PROVENANCE: 'true'
        run: |
          echo "🚀 [Step 4] Publishing sparkling-app-template to npm..."
          echo "   Version: ${{ needs.prepare.outputs.version }}"
          echo "   Working directory: $(pwd)"
          echo "   Auth: Trusted Publishing (OIDC)"
          echo "   Provenance: enabled"
          echo ""
          if [ "${{ needs.prepare.outputs.is_rc }}" == "true" ]; then
            echo "   Tag: rc"
            pnpm publish --registry https://registry.npmjs.org --access public --tag rc --no-git-checks
          else
            echo "   Tag: latest"
            pnpm publish --registry https://registry.npmjs.org --access public --tag latest --no-git-checks
          fi
          echo ""
          echo "✅ sparkling-app-template published to npm successfully"

      # Step 4b: Create PR to update template dependencies in main branch
      - name: Create branch and commit template updates
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          BRANCH="chore/update-template-deps-${VERSION}"

          echo "📝 [Step 4b] Creating PR to update template dependencies..."
          echo "   Branch: $BRANCH"
          echo "   Version: $VERSION"
          echo ""

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create a new branch from the current tag
          git checkout -b "$BRANCH"

          # Re-apply the template dependency changes (they were done in working tree earlier)
          # Update template package.json
          TEMPLATE_PKG="template/sparkling-app-template/package.json"
          sed -i '' "s|\"sparkling-navigation\": *\"[^\"]*\"|\"sparkling-navigation\": \"^${VERSION}\"|" "$TEMPLATE_PKG"
          sed -i '' "s|\"sparkling-debug-tool\": *\"[^\"]*\"|\"sparkling-debug-tool\": \"~${VERSION}\"|" "$TEMPLATE_PKG"
          sed -i '' "s|\"sparkling-app-cli\": *\"[^\"]*\"|\"sparkling-app-cli\": \"~${VERSION}\"|" "$TEMPLATE_PKG"

          # Update Android build.gradle.kts
          GRADLE_FILE="template/sparkling-app-template/android/app/build.gradle.kts"
          sed -i '' "s|com.tiktok.sparkling:sparkling:[^\"]*|com.tiktok.sparkling:sparkling:${VERSION}|" "$GRADLE_FILE"
          sed -i '' "s|com.tiktok.sparkling:sparkling-method:[^\"]*|com.tiktok.sparkling:sparkling-method:${VERSION}|" "$GRADLE_FILE"

          # Update iOS Podfile
          PODFILE="template/sparkling-app-template/ios/Podfile"
          sed -i '' "s|SPARKLING_VERSION = '[^']*'|SPARKLING_VERSION = '${VERSION}'|" "$PODFILE"

          # Also update root and SDK package.json versions via the version script
          chmod +x scripts/update-all-version.sh
          ./scripts/update-all-version.sh "$VERSION"

          # Stage and commit
          git add -A
          if git diff --cached --quiet; then
            echo "⚠️ No changes to commit - template dependencies may already be up to date"
          else
            git commit -m "chore: update template dependencies to ${VERSION}"
            echo "✅ Changes committed"

            echo ""
            echo "   Pushing branch to origin..."
            git push origin "$BRANCH"
            echo "✅ Branch pushed to origin"

            echo ""
            echo "   Creating pull request..."
            PR_BODY=$(cat <<'PREOF'
          ## Summary

          Auto-generated by the publish workflow after releasing version.

          Updates `sparkling-app-template` dependencies to match the published versions:

          - **TypeScript** (`template/sparkling-app-template/package.json`):
            - `sparkling-navigation`
            - `sparkling-debug-tool`
            - `sparkling-app-cli`
          - **Android** (`template/sparkling-app-template/android/app/build.gradle.kts`):
            - `com.tiktok.sparkling:sparkling`
            - `com.tiktok.sparkling:sparkling-method`
          - **iOS** (`template/sparkling-app-template/ios/Podfile`):
            - `SPARKLING_VERSION`
          - **Root & SDK versions** aligned

          > This PR was created automatically by GitHub Actions.
          PREOF
          )
            # Replace generic text with actual version
            PR_BODY="${PR_BODY//releasing version/releasing version \`${VERSION}\`}"

            PR_URL=$(gh pr create \
              --title "chore: update template dependencies to ${VERSION}" \
              --body "$PR_BODY" \
              --base main \
              --head "$BRANCH" 2>&1) || {
              echo "❌ Failed to create PR!"
              echo "::error::Failed to create pull request for template dependency updates"
              echo "   Output: $PR_URL"
              exit 0  # Don't fail the whole job just because PR creation failed
            }
            echo "✅ Pull request created: $PR_URL"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────────────────────
  # Step 5: Create GitHub Release
  # ──────────────────────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [prepare, publish-template]
    if: always() && needs.prepare.result == 'success'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log job start
        run: |
          echo "========================================="
          echo "  Step 5: Create GitHub Release"
          echo "========================================="
          echo "  Version: ${{ needs.prepare.outputs.version }}"
          echo "  Is RC:   ${{ needs.prepare.outputs.is_rc }}"
          echo "========================================="

      - name: Determine release status
        id: status
        run: |
          echo "📋 Checking publish job results..."
          TEMPLATE_RESULT="${{ needs.publish-template.result }}"
          echo "   publish-template: $TEMPLATE_RESULT"

          if [ "$TEMPLATE_RESULT" == "success" ]; then
            echo "all_success=true" >> $GITHUB_OUTPUT
            echo "✅ All publish jobs succeeded - creating release"
          else
            echo "all_success=false" >> $GITHUB_OUTPUT
            echo "⚠️ Some publish jobs failed - creating draft release"
            echo "::warning::Not all publish jobs succeeded. Release will be created as draft."
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ needs.prepare.outputs.version }}
          draft: ${{ needs.prepare.outputs.is_rc == 'true' || steps.status.outputs.all_success != 'true' }}
          prerelease: ${{ needs.prepare.outputs.is_rc == 'true' }}
          generate_release_notes: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Log release result
        run: |
          echo "========================================="
          if [ "${{ needs.prepare.outputs.is_rc }}" == "true" ]; then
            echo "✅ Draft pre-release created for ${{ needs.prepare.outputs.version }}"
          elif [ "${{ steps.status.outputs.all_success }}" == "true" ]; then
            echo "✅ Release created for ${{ needs.prepare.outputs.version }}"
          else
            echo "⚠️ Draft release created for ${{ needs.prepare.outputs.version }} (some jobs failed)"
          fi
          echo "========================================="

  # ──────────────────────────────────────────────────────────────
  # Notify on failure
  # ──────────────────────────────────────────────────────────────
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [prepare, preflight-registry-auth, preflight-cocoapods-auth, publish-typescript, publish-android, publish-ios-method, publish-ios-sdk, publish-ios-debug-tool, publish-template]
    if: failure()
    steps:
      - name: Report failure details
        run: |
          echo "========================================="
          echo "  ❌ PUBLISH WORKFLOW FAILED"
          echo "========================================="
          echo ""
          echo "  Version: ${{ needs.prepare.outputs.version }}"
          echo ""
          echo "  Job Results:"
          echo "    prepare:                ${{ needs.prepare.result }}"
          echo "    preflight-registry:     ${{ needs.preflight-registry-auth.result }}"
          echo "    preflight-cocoapods:    ${{ needs.preflight-cocoapods-auth.result }}"
          echo "    publish-typescript:     ${{ needs.publish-typescript.result }}"
          echo "    publish-android:        ${{ needs.publish-android.result }}"
          echo "    publish-ios-method:     ${{ needs.publish-ios-method.result }}"
          echo "    publish-ios-sdk:        ${{ needs.publish-ios-sdk.result }}"
          echo "    publish-ios-debug-tool: ${{ needs.publish-ios-debug-tool.result }}"
          echo "    publish-template:       ${{ needs.publish-template.result }}"
          echo ""
          echo "  Please check the individual job logs above for details."
          echo "========================================="
          echo ""
          echo "::error::Publishing failed for version ${{ needs.prepare.outputs.version }}. See job results above."
