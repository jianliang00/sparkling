name: Publish Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version to use (e.g. 2.1.0-rc.9 or 2.1.0)'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  id-token: write

env:
  NODE_VERSION: '22.21.1'
  PNPM_VERSION: '10.26.0'
  NPM_REGISTRY_URL: 'https://registry.npmjs.org'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ──────────────────────────────────────────────────────────────
  # Step 0: Extract version from tag
  # ──────────────────────────────────────────────────────────────
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      is_rc: ${{ steps.get_version.outputs.is_rc }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: get_version
        run: |
          echo "========================================="
          echo "  Step 0: Resolving release version"
          echo "========================================="

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
            if [ -z "$VERSION" ]; then
              echo "::error::workflow_dispatch input 'version' is required"
              exit 1
            fi
            echo "   Source: workflow_dispatch input"
          else
            VERSION=${GITHUB_REF#refs/tags/}
            echo "   Source: git tag"
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "✅ Extracted version: $VERSION"
          echo "   Git ref: $GITHUB_REF"
          echo "   SHA: $GITHUB_SHA"

          if [[ "$VERSION" =~ -rc\.[0-9]+$ ]]; then
            echo "is_rc=true" >> $GITHUB_OUTPUT
            echo "✅ Detected RC (release candidate) version"
          else
            echo "is_rc=false" >> $GITHUB_OUTPUT
            echo "✅ Detected stable release version"
          fi
          echo "========================================="

  # ──────────────────────────────────────────────────────────────
  # Step 1: Update all versions (Android/iOS/JS)
  # This is done inside each publish job since they run on
  # different runners. The prepare job provides the version.
  # ──────────────────────────────────────────────────────────────

  preflight-linux-auth:
    name: Preflight npm + Maven auth
    runs-on: ubuntu-latest
    needs: prepare
    environment:
      name: package releasement
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify npm + Maven auth
        uses: ./.github/actions/preflight-registry-auth
        with:
          publish_android: 'true'
          maven_central_username: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          maven_central_password: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          signing_key_id: ${{ secrets.SIGNING_KEY_ID }}
          signing_password: ${{ secrets.SIGNING_PASSWORD }}
          signing_key: ${{ secrets.SIGNING_KEY }}

  preflight-darwin-auth:
    name: Preflight CocoaPods auth
    runs-on: macos-latest
    needs: prepare
    environment:
      name: package releasement
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify CocoaPods auth
        uses: ./.github/actions/preflight-registry-auth
        with:
          publish_ios: 'true'
          cocoapods_trunk_token: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}

  # ──────────────────────────────────────────────────────────────
  # Step 2: Publish Android and npm packages in parallel
  #         (playground, sparkling-app-template are NOT published here)
  #         iOS SDK is bundled in @sparklingjs/runtime npm package (ios/ directory)
  # ──────────────────────────────────────────────────────────────

  # 2a. Publish TypeScript packages to npm
  publish-typescript:
    name: Publish NPM Packages
    runs-on: ubuntu-latest
    needs: [prepare, preflight-linux-auth]
    environment:
      name: package releasement
      url: https://www.npmjs.com/package/@sparklingjs/runtime
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log job start
        run: |
          echo "========================================="
          echo "  Step 2a: Publish NPM Packages"
          echo "========================================="
          echo "  Version: ${{ needs.prepare.outputs.version }}"
          echo "  Is RC:   ${{ needs.prepare.outputs.is_rc }}"
          echo "  Runner:  ${{ runner.os }} (${{ runner.arch }})"
          echo "========================================="

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: ${{ env.NPM_REGISTRY_URL }}

      - name: Ensure latest npm (>= 11.5.1 required for Trusted Publishing)
        run: |
          echo "📦 Upgrading npm for Trusted Publishing support..."
          npm install -g npm@latest
          echo "✅ npm version: $(npm --version)"

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: |
          echo "📦 Installing dependencies with frozen lockfile..."
          pnpm install --frozen-lockfile
          echo "✅ Dependencies installed successfully"

      - name: Build packages
        run: |
          echo "🔨 Building all packages (skipping website)..."
          pnpm --filter '!sparkling-website' -r build
          echo "✅ All packages built successfully"

      - name: Update versions
        run: |
          echo "📝 Updating all versions to ${{ needs.prepare.outputs.version }}..."
          chmod +x scripts/update-all-version.sh
          ./scripts/update-all-version.sh ${{ needs.prepare.outputs.version }}
          echo "✅ Versions updated successfully"

      - name: Check if npm packages already published
        id: npm_check
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          echo "🔍 Checking if all npm packages are already published at version $VERSION..."
          mapfile -t PKGS < <(node - <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');

          const repoRoot = process.cwd();
          const excluded = new Set(["sparkling-playground", "sparkling-app-template"]);
          const roots = [path.join(repoRoot, "packages"), path.join(repoRoot, "template")];

          function readPackageJson(dir) {
            const pj = path.join(dir, 'package.json');
            if (!fs.existsSync(pj)) return null;
            try {
              return JSON.parse(fs.readFileSync(pj, 'utf8'));
            } catch {
              return null;
            }
          }

          const out = [];
          for (const root of roots) {
            if (!fs.existsSync(root)) continue;
            for (const name of fs.readdirSync(root)) {
              const dir = path.join(root, name);
              if (!fs.statSync(dir).isDirectory()) continue;
              if (name === 'website') continue;
              if (dir.includes(`${path.sep}test${path.sep}`)) continue;
              const pkg = readPackageJson(dir);
              if (!pkg || !pkg.name) continue;
              if (pkg.private) continue;
              if (excluded.has(pkg.name)) continue;
              out.push(pkg.name);

              if (root.endsWith(`${path.sep}packages`) && name === 'methods') {
                for (const m of fs.readdirSync(dir)) {
                  const sub = path.join(dir, m);
                  if (!fs.statSync(sub).isDirectory()) continue;
                  const subPkg = readPackageJson(sub);
                  if (!subPkg || !subPkg.name || subPkg.private || excluded.has(subPkg.name)) continue;
                  out.push(subPkg.name);
                }
              }
            }
          }

          [...new Set(out)].sort().forEach((name) => console.log(name));
          NODE
          )

          ALL_PUBLISHED=true
          for pkg in "${PKGS[@]}"; do
            if npm view "${pkg}@${VERSION}" version --registry "$NPM_REGISTRY_URL" 2>/dev/null | grep -q "$VERSION"; then
              echo "   ✅ ${pkg}@${VERSION} already exists"
            else
              echo "   ⏳ ${pkg}@${VERSION} not found yet"
              ALL_PUBLISHED=false
            fi
          done

          if [ "$ALL_PUBLISHED" = "true" ]; then
            echo "⚠️ All npm packages at version $VERSION already exist — skipping publish"
            echo "already_published=true" >> $GITHUB_OUTPUT
          else
            echo "✅ Some npm packages are missing at version $VERSION — publish will continue"
            echo "already_published=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish to npm
        if: steps.npm_check.outputs.already_published != 'true'
        env:
          NPM_CONFIG_PROVENANCE: 'true'
          SPARKLING_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          echo "🚀 Publishing TypeScript packages to npm..."
          echo "   Version: ${{ needs.prepare.outputs.version }}"
          echo "   Is RC: ${{ needs.prepare.outputs.is_rc }}"
          echo "   Auth: Trusted Publishing (OIDC)"
          echo "   Provenance: enabled"
          if [ "${{ needs.prepare.outputs.is_rc }}" == "true" ]; then
            echo "   Tag: rc"
            node scripts/release-unify-and-publish.mjs publish --version ${{ needs.prepare.outputs.version }} --tag rc --trusted-publishing
          else
            echo "   Tag: latest"
            node scripts/release-unify-and-publish.mjs publish --version ${{ needs.prepare.outputs.version }} --release --trusted-publishing
          fi
          echo "✅ TypeScript packages published successfully"

  # 2b. Publish Android to Maven Central
  publish-android:
    name: Publish Android to Maven Central
    runs-on: ubuntu-latest
    needs: [prepare, preflight-linux-auth]
    environment:
      name: package releasement
      url: https://central.sonatype.com/artifact/com.tiktok.sparkling/sparkling
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish Android
        uses: ./.github/actions/publish-android
        with:
          version: ${{ needs.prepare.outputs.version }}
          maven_central_username: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          maven_central_password: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          signing_key_id: ${{ secrets.SIGNING_KEY_ID }}
          signing_password: ${{ secrets.SIGNING_PASSWORD }}
          signing_key: ${{ secrets.SIGNING_KEY }}

  # ──────────────────────────────────────────────────────────────
  # Step 3a: Verify template JS build first
  # ──────────────────────────────────────────────────────────────
  verify-template-js:
    name: Verify App Template JS
    runs-on: ubuntu-latest
    needs: [prepare, publish-typescript, publish-android]
    environment:
      name: package releasement
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: ${{ env.NPM_REGISTRY_URL }}

      - name: Ensure latest npm (>= 11.5.1 required for Trusted Publishing)
        run: |
          echo "📦 Upgrading npm for Trusted Publishing support..."
          npm install -g npm@latest
          echo "✅ npm version: $(npm --version)"

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: |
          echo "📦 Installing workspace dependencies..."
          pnpm install --frozen-lockfile
          echo "✅ Dependencies installed successfully"

      - name: Build packages
        run: |
          echo "🔨 Building all packages (skipping website)..."
          pnpm --filter '!sparkling-website' -r build
          echo "✅ All packages built successfully"

      - name: Update all versions
        run: |
          echo "📝 Updating all versions to ${{ needs.prepare.outputs.version }}..."
          chmod +x scripts/update-all-version.sh
          ./scripts/update-all-version.sh ${{ needs.prepare.outputs.version }}
          echo "✅ Versions updated successfully"

      - name: Wait for npm packages availability
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          echo "⏳ Waiting for npm packages to be available..."
          ALL_FOUND=true
          for pkg in sparkling-navigation sparkling-debug-tool sparkling-app-cli sparkling-types sparkling-method; do
            FOUND=false
            for i in {1..30}; do
              if pnpm view "$pkg@$VERSION" version 2>/dev/null | grep -q "$VERSION"; then
                echo "✅ $pkg@$VERSION is available on npm (after $i checks)"
                FOUND=true
                break
              fi
              echo "Waiting for $pkg... ($i/30, next check in 10s)"
              sleep 10
            done
            if [ "$FOUND" != "true" ]; then
              echo "::error::$pkg@$VERSION not available on npm after 5 minutes"
              ALL_FOUND=false
            fi
          done
          if [ "$ALL_FOUND" != "true" ]; then
            exit 1
          fi

      - name: Verify template JS build
        working-directory: template/sparkling-app-template
        run: |
          echo "🔨 Verifying template JS build..."
          pnpm install --no-frozen-lockfile
          pnpm build
          echo "✅ Template JS build succeeded"

  # ──────────────────────────────────────────────────────────────
  # Step 3b: Verify template Android build (parallel with iOS)
  # ──────────────────────────────────────────────────────────────
  verify-template-android:
    name: Verify App Template Android
    runs-on: ubuntu-latest
    needs: [prepare, verify-template-js]
    environment:
      name: package releasement
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: ${{ env.NPM_REGISTRY_URL }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile

      - name: Update all versions
        run: |
          chmod +x scripts/update-all-version.sh
          ./scripts/update-all-version.sh ${{ needs.prepare.outputs.version }}

      - name: Verify template Android build
        working-directory: template/sparkling-app-template/android
        run: |
          echo "🔨 Verifying template Android build..."
          chmod +x ./gradlew 2>/dev/null || true
          ./gradlew assembleDebug --no-daemon
          echo "✅ Template Android build succeeded"

  # ──────────────────────────────────────────────────────────────
  # Step 2c: Publish iOS pods
  #   Runs in parallel with npm and Android publishing.
  #   Composite action: build artifacts → upload to GitHub Release
  #   → publish to CocoaPods trunk (all in one runner, no artifact
  #   upload/download needed between steps).
  # ──────────────────────────────────────────────────────────────
  publish-ios:
    name: Publish iOS Pods
    runs-on: macos-latest
    needs: [prepare, preflight-darwin-auth]
    permissions:
      contents: write
    environment:
      name: package releasement
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Publish iOS pods
        uses: ./.github/actions/publish-ios
        with:
          version: ${{ needs.prepare.outputs.version }}
          is_rc: ${{ needs.prepare.outputs.is_rc }}
          cocoapods_trunk_token: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────────────────────
  # Step 3c: Verify template iOS pod install (mac runner)
  #   Sparkling is resolved from CocoaPods trunk and methods from
  #   node_modules via :path.
  # ──────────────────────────────────────────────────────────────
  verify-template-ios:
    name: Verify App Template iOS
    runs-on: macos-latest
    needs: [prepare, verify-template-js, publish-ios]
    environment:
      name: package releasement
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: ${{ env.NPM_REGISTRY_URL }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install CocoaPods
        run: |
          echo "📦 Installing CocoaPods..."
          bundle install
          echo "✅ CocoaPods version: $(bundle exec pod --version)"

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile

      - name: Update all versions
        run: |
          chmod +x scripts/update-all-version.sh
          ./scripts/update-all-version.sh ${{ needs.prepare.outputs.version }}

      - name: Install template npm dependencies
        working-directory: template/sparkling-app-template
        run: |
          echo "📦 Installing template dependencies (methods + tooling)..."
          pnpm install --no-frozen-lockfile
          echo "✅ Template npm dependencies installed"
          echo "   node_modules/sparkling-method/ios exists: $(test -d node_modules/sparkling-method/ios && echo yes || echo no)"

      - name: Verify template iOS pod install
        working-directory: template/sparkling-app-template/ios
        run: |
          echo "🔨 Verifying template iOS pod install..."
          echo "   Sparkling resolved from CocoaPods trunk; SparklingMethod from node_modules via :path"
          bundle exec pod install --repo-update
          echo "✅ Template iOS pod install succeeded"

  # ──────────────────────────────────────────────────────────────
  # Step 4: Publish sparkling-app-template to npm
  #         on a stable Linux runner
  # ──────────────────────────────────────────────────────────────
  publish-template:
    name: Publish App Template
    runs-on: ubuntu-latest
    needs: [prepare, verify-template-js, verify-template-android, verify-template-ios]
    environment:
      name: package releasement
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log job start
        run: |
          echo "========================================="
          echo "  Step 4: Publish App Template"
          echo "========================================="
          echo "  Version: ${{ needs.prepare.outputs.version }}"
          echo "  Is RC:   ${{ needs.prepare.outputs.is_rc }}"
          echo "  Runner:  ${{ runner.os }} (${{ runner.arch }})"
          echo "  Depends: verify-template-js, verify-template-android, verify-template-ios"
          echo "========================================="

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: ${{ env.NPM_REGISTRY_URL }}

      - name: Ensure latest npm (>= 11.5.1 required for Trusted Publishing)
        run: |
          echo "📦 Upgrading npm for Trusted Publishing support..."
          npm install -g npm@latest
          echo "✅ npm version: $(npm --version)"

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: |
          echo "📦 Installing workspace dependencies..."
          pnpm install --frozen-lockfile
          echo "✅ Dependencies installed successfully"

      - name: Update all versions
        run: |
          echo "📝 [Step 4a] Updating all versions to ${{ needs.prepare.outputs.version }}..."
          chmod +x scripts/update-all-version.sh
          ./scripts/update-all-version.sh ${{ needs.prepare.outputs.version }}
          echo "✅ Versions updated successfully"

      - name: Verify template versions before publish
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          export VERSION
          echo "🔎 Verifying template versions before publish..."

          node -e '
            const fs = require("node:fs");
            const version = process.env.VERSION;
            const pkgPath = "template/sparkling-app-template/package.json";
            const pkg = JSON.parse(fs.readFileSync(pkgPath, "utf8"));

            const expectedDeps = {
              "sparkling-navigation": `^${version}`,
              "sparkling-debug-tool": `~${version}`,
              "sparkling-app-cli": `~${version}`,
              "sparkling-types": `~${version}`,
              "sparkling-method": `~${version}`,
            };

            if (pkg.version !== version) {
              console.error(`Template version mismatch: expected ${version}, got ${pkg.version}`);
              process.exit(1);
            }

            for (const [name, expected] of Object.entries(expectedDeps)) {
              const actual = pkg.dependencies?.[name] ?? pkg.devDependencies?.[name];
              if (actual !== expected) {
                console.error(`Dependency mismatch for ${name}: expected ${expected}, got ${actual ?? "<missing>"}`);
                process.exit(1);
              }
            }

            console.log("Template package version and dependencies are aligned.");
          '

          if ! grep -q "com.tiktok.sparkling:sparkling:${VERSION}" template/sparkling-app-template/android/app/build.gradle.kts; then
            echo "::error::Android sparkling dependency is not updated to ${VERSION}"
            exit 1
          fi

          if ! grep -q "com.tiktok.sparkling:sparkling-method:${VERSION}" template/sparkling-app-template/android/app/build.gradle.kts; then
            echo "::error::Android sparkling-method dependency is not updated to ${VERSION}"
            exit 1
          fi

          echo "✅ Template dependency versions are verified"

      - name: Check if template already published
        id: template_check
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          echo "🔍 Checking if sparkling-app-template is already published at version $VERSION..."
          if pnpm view "sparkling-app-template@$VERSION" version 2>/dev/null | grep -q "$VERSION"; then
            echo "⚠️ sparkling-app-template@$VERSION already exists on npm — skipping publish"
            echo "::warning::sparkling-app-template at version $VERSION already published. Skipping."
            echo "already_published=true" >> $GITHUB_OUTPUT
          else
            echo "✅ sparkling-app-template@$VERSION not found on npm — proceeding with publish"
            echo "already_published=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish template to npm
        if: steps.template_check.outputs.already_published != 'true'
        working-directory: template/sparkling-app-template
        env:
          NPM_CONFIG_PROVENANCE: 'true'
        run: |
          echo "🚀 [Step 4] Publishing sparkling-app-template to npm..."
          echo "   Version: ${{ needs.prepare.outputs.version }}"
          echo "   Working directory: $(pwd)"
          echo "   Auth: Trusted Publishing (OIDC)"
          echo "   Provenance: enabled"
          echo ""
          if [ "${{ needs.prepare.outputs.is_rc }}" == "true" ]; then
            echo "   Tag: rc"
            pnpm publish --registry "$NPM_REGISTRY_URL" --access public --tag rc --no-git-checks
          else
            echo "   Tag: latest"
            pnpm publish --registry "$NPM_REGISTRY_URL" --access public --tag latest --no-git-checks
          fi
          echo ""
          echo "✅ sparkling-app-template published to npm successfully"

      - name: Create branch and commit template updates
        if: needs.prepare.outputs.is_rc != 'true'
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          BRANCH="chore/update-template-deps-${VERSION}"

          echo "📝 [Step 4b] Creating PR to update template dependencies..."
          echo "   Branch: $BRANCH"
          echo "   Version: $VERSION"
          echo ""

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"

          chmod +x scripts/update-all-version.sh
          ./scripts/update-all-version.sh "$VERSION"

          git add -A
          if git diff --cached --quiet; then
            echo "⚠️ No changes to commit - template dependencies may already be up to date"
          else
            git commit -m "chore: update template dependencies to ${VERSION}"
            echo "✅ Changes committed"

            echo ""
            echo "   Pushing branch to origin..."
            git push origin "$BRANCH"
            echo "✅ Branch pushed to origin"

            echo ""
            echo "   Creating pull request..."
            PR_BODY=$(cat <<'PREOF'
          ## Summary

          Auto-generated by the publish workflow after releasing version.

          Updates `sparkling-app-template` dependencies to match the published versions:

          - **TypeScript** (`template/sparkling-app-template/package.json`):
            - `sparkling-navigation`
            - `sparkling-debug-tool`
            - `sparkling-app-cli`
            - `sparkling-types`
            - `sparkling-method` (iOS source via npm)
          - **Android** (`template/sparkling-app-template/android/app/build.gradle.kts`):
            - `com.tiktok.sparkling:sparkling`
            - `com.tiktok.sparkling:sparkling-method`
          - **iOS** (`template/sparkling-app-template/ios/Podfile`):
            - `Sparkling` pod pinned to release version from CocoaPods trunk
            - `SparklingMethod` resolved from `node_modules` via `:path`
          - **Root & SDK versions** aligned

          > This PR was created automatically by GitHub Actions.
          PREOF
          )
            PR_BODY="${PR_BODY//releasing version/releasing version \`${VERSION}\`}"

            PR_URL=$(gh pr create \
              --title "chore: update template dependencies to ${VERSION}" \
              --body "$PR_BODY" \
              --base main \
              --head "$BRANCH" 2>&1) || {
              if echo "$PR_URL" | grep -q "already exists"; then
                echo "⚠️ PR already exists for branch $BRANCH, reusing it"
                PR_URL=$(gh pr view --head "$BRANCH" --base main --json url --jq .url 2>/dev/null) || {
                  echo "::warning::Failed to resolve existing PR URL for branch $BRANCH"
                  echo "   Output: $PR_URL"
                  exit 0
                }
              else
                echo "❌ Failed to create PR!"
                echo "::error::Failed to create pull request for template dependency updates"
                echo "   Output: $PR_URL"
                exit 0
              fi
            }
            echo "✅ Pull request ready: $PR_URL"

            echo "🤖 Enabling auto-merge after required checks..."
            gh pr merge "$PR_URL" --auto --squash --delete-branch || {
              echo "::warning::Failed to enable auto-merge for $PR_URL"
              echo "   Please verify repository auto-merge/bypass settings and CLA bot allowlist."
              exit 0
            }
            echo "✅ Auto-merge enabled for $PR_URL"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────────────────────
  # Notify on failure
  # ──────────────────────────────────────────────────────────────
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [prepare, preflight-linux-auth, preflight-darwin-auth, publish-typescript, publish-android, publish-ios, verify-template-js, verify-template-android, verify-template-ios, publish-template]
    if: failure()
    steps:
      - name: Report failure details
        run: |
          echo "========================================="
          echo "  ❌ PUBLISH WORKFLOW FAILED"
          echo "========================================="
          echo ""
          echo "  Version: ${{ needs.prepare.outputs.version }}"
          echo ""
          echo "  Job Results:"
          echo "    prepare:                 ${{ needs.prepare.result }}"
          echo "    preflight-registry:      ${{ needs.preflight-registry-auth.result }}"
          echo "    publish-typescript:      ${{ needs.publish-typescript.result }}"
          echo "    publish-android:         ${{ needs.publish-android.result }}"
          echo "    publish-ios:             ${{ needs.publish-ios.result }}"
          echo "    verify-template-js:      ${{ needs.verify-template-js.result }}"
          echo "    verify-template-android: ${{ needs.verify-template-android.result }}"
          echo "    verify-template-ios:     ${{ needs.verify-template-ios.result }}"
          echo "    publish-template:        ${{ needs.publish-template.result }}"
          echo ""
          echo "  Please check the individual job logs above for details."
          echo "========================================="
          echo ""
          echo "::error::Publishing failed for version ${{ needs.prepare.outputs.version }}. See job results above."
